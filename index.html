<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetterSociety | Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #8b5cf6; }
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: mobileFade 0.3s ease-out; }
        
        @keyframes mobileFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide custom cursor on mobile touch devices */
        @media (pointer: coarse) { .custom-cursor { display: none; } body { cursor: auto; } }
        
        .nav-blur { backdrop-filter: blur(20px); background: rgba(10, 10, 10, 0.8); }
        
        .mobile-card {
            background: linear-gradient(145deg, #111, #080808);
            border: 1px solid rgba(139, 92, 246, 0.15);
        }
    </style>
</head>
<body class="pb-24"> <header class="fixed top-0 w-full z-50 border-b border-white/5 nav-blur px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-6 h-6 rounded bg-[#8b5cf6] flex items-center justify-center text-[10px] font-bold text-white">BS</div>
            <span class="font-bold tracking-tighter">BetterSociety</span>
        </div>
        <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
    </header>

    <main class="pt-20 px-4">
        
        <section id="home" class="tab-content active text-center py-10">
            <h1 class="text-4xl font-extrabold mb-4 leading-tight">Best MultiTool <br>
            <p class="text-neutral-500 text-sm mb-8 px-4">Manage your BetterSociety license and system modules from anywhere.</p>
            <div class="mobile-card p-6 rounded-3xl text-left border-l-4 border-l-[#8b5cf6]">
                <p class="text-[10px] uppercase tracking-widest text-[#8b5cf6] font-bold mb-1">Status</p>
                <p class="text-lg font-bold">V3.0.4 - Undetected</p>
                <p class="text-xs text-neutral-500">Last updated: 2 hours ago</p>
            </div>
        </section>

        <section id="utility" class="tab-content py-6">
            <h2 class="text-2xl font-bold mb-6">Modules</h2>
            <div class="space-y-4">
                <div class="mobile-card p-5 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-[#8b5cf6]/20 rounded-xl flex items-center justify-center text-[#8b5cf6]">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </div>
                        <div>
                            <p class="font-bold text-sm">Kernel Boost</p>
                            <p class="text-[10px] text-neutral-500 uppercase">Optimizer</p>
                        </div>
                    </div>
                    <button class="bg-[#8b5cf6] text-[10px] font-bold px-4 py-2 rounded-lg">RUN</button>
                </div>

                <div class="mobile-card p-5 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-[#8b5cf6]/20 rounded-xl flex items-center justify-center text-[#8b5cf6]">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-width="2" stroke-linecap="round"/></svg>
                        </div>
                        <div>
                            <p class="font-bold text-sm">Safe Mode</p>
                            <p class="text-[10px] text-neutral-500 uppercase">Security</p>
                        </div>
                    </div>
                    <div class="w-10 h-5 bg-neutral-800 rounded-full relative">
                        <div class="absolute right-1 top-1 w-3 h-3 bg-[#8b5cf6] rounded-full"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="pricing" class="tab-content py-10 text-center">
            <h2 class="text-3xl font-bold mb-8">Lifetime</h2>
            <div class="mobile-card p-10 rounded-[40px] border-2 border-[#8b5cf6]">
                <div class="text-5xl font-black mb-2">$14.99</div>
                <p class="text-neutral-500 text-xs mb-8">No monthly fees. Forever access.</p>
                <button class="w-full bg-[#8b5cf6] py-4 rounded-2xl font-bold">Purchase Access</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full h-20 border-t border-white/5 nav-blur flex items-center justify-around px-6 pb-2">
        <button onclick="showTab('home')" class="flex flex-col items-center gap-1 text-neutral-500 hover:text-[#8b5cf6] transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2"/></svg>
            <span class="text-[10px] font-bold uppercase tracking-widest">Home</span>
        </button>
        <button onclick="showTab('utility')" class="flex flex-col items-center gap-1 text-neutral-500 hover:text-[#8b5cf6] transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2"/></svg>
            <span class="text-[10px] font-bold uppercase tracking-widest">GUI</span>
        </button>
        <button onclick="showTab('pricing')" class="flex flex-col items-center gap-1 text-neutral-500 hover:text-[#8b5cf6] transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2"/></svg>
            <span class="text-[10px] font-bold uppercase tracking-widest">Buy</span>
        </button>
    </nav>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            // Visual feedback for nav buttons
            document.querySelectorAll('nav button').forEach(btn => btn.classList.replace('text-[#8b5cf6]', 'text-neutral-500'));
            event.currentTarget.classList.replace('text-neutral-500', 'text-[#8b5cf6]');
        }
    </script>
</body>
</html>
